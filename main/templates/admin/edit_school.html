{% extends 'admin/base_admin.html' %}

{% block title %}Редактировать школу{% endblock %}

{% block content %}
<div class="form-card">
    <h2 style="color: #667eea; margin-bottom: 1.5rem; text-align: center;">Редактировать школу</h2>

    <div style="background: #f8f9fa; padding: 1rem; border-radius: 10px; margin-bottom: 1.5rem;">
        <p style="color: #666; text-align: center;">
            <strong>Школа:</strong> {{ school.name }} |
            <strong>ID:</strong> {{ school.school_id }}
        </p>
    </div>

    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label>Название школы</label>
            <input type="text" name="name" class="form-control" value="{{ school.name }}" required>
        </div>

        <div class="form-group">
            <label>Адрес</label>
            <input type="text" name="address" class="form-control" value="{{ school.address }}" required>
        </div>

        <div class="form-group">
            <label>Фамилия директора <span style="color: red;">*</span></label>
            <input type="text" name="director_last_name" class="form-control"
                   value="{{ school.director_last_name|default:'' }}"
                   placeholder="Иванов" required>
        </div>

        <div class="form-group">
            <label>Имя директора <span style="color: red;">*</span></label>
            <input type="text" name="director_first_name" class="form-control"
                   value="{{ school.director_first_name|default:'' }}"
                   placeholder="Иван" required>
        </div>

        <div class="form-group">
            <label>Отчество директора</label>
            <input type="text" name="director_middle_name" class="form-control"
                   value="{{ school.director_middle_name|default:'' }}"
                   placeholder="Иванович">
        </div>

        <div style="display: flex; gap: 1rem; justify-content: center;">
            <button type="submit" class="btn btn-success">Сохранить</button>
            <a href="{% url 'admin_schools' %}" class="btn" style="background: #6c757d;">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
