{% extends 'admin/base_admin.html' %}

{% block title %}Добавить абитуриента{% endblock %}

{% block content %}
<div class="form-card" style="max-width: 900px;">
    <h2 style="color: #667eea; margin-bottom: 1.5rem; text-align: center;">Добавить абитуриента</h2>

    <form method="post">
        {% csrf_token %}

        <!-- Данные абитуриента -->
        <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 1rem; border-radius: 10px; margin-bottom: 1.5rem;">
            <h3 style="margin: 0; font-size: 1.2rem;">Данные абитуриента</h3>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label>Логин (username)</label>
                <input type="text" name="username" class="form-control" placeholder="Логин для входа" required>
            </div>

            <div class="form-group">
                <label>Пароль</label>
                <input type="password" name="password" class="form-control" placeholder="Пароль" required>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label>Имя</label>
                <input type="text" name="first_name" class="form-control" placeholder="Имя" required>
            </div>

            <div class="form-group">
                <label>Фамилия</label>
                <input type="text" name="last_name" class="form-control" placeholder="Фамилия" required>
            </div>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" class="form-control" placeholder="Email" required>
        </div>

        <div class="form-group">
            <label>Телефон</label>
            <input type="text" name="phone" class="form-control" placeholder="+7 (___) ___-__-__">
        </div>

        <div class="form-group">
            <label>Класс</label>
            <input type="text" name="class_name" class="form-control" placeholder="9а, 11б и т.д." required>
        </div>

        <div class="form-group">
            <label>Школа</label>
            <select name="school_id" class="form-control">
                <option value="">-- Выберите школу --</option>
                {% for school in schools %}
                <option value="{{ school.school_id }}">{{ school.name }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Данные родителя -->
        <div style="background: linear-gradient(135deg, #28a745 0%, #218838 100%); color: white; padding: 1rem; border-radius: 10px; margin: 2rem 0 1.5rem;">
            <h3 style="margin: 0; font-size: 1.2rem;">Данные родителя</h3>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label>Имя родителя</label>
                <input type="text" name="parent_first_name" class="form-control" placeholder="Имя" required>
            </div>

            <div class="form-group">
                <label>Фамилия родителя</label>
                <input type="text" name="parent_last_name" class="form-control" placeholder="Фамилия" required>
            </div>
        </div>

        <div class="form-group">
            <label>Телефон родителя</label>
            <input type="text" name="parent_phone" class="form-control" placeholder="+7 (___) ___-__-__" required>
        </div>

        <div class="form-group">
            <label>Паспортные данные</label>
            <input type="text" name="parent_pasport" class="form-control" placeholder="Серия и номер паспорта">
        </div>

        <div class="form-group">
            <label>ИНН</label>
            <input type="text" name="parent_inn" class="form-control" placeholder="ИНН">
        </div>

        <div class="form-group">
            <label>Адрес</label>
            <input type="text" name="parent_address" class="form-control" placeholder="Адрес проживания">
        </div>

        <!-- Кнопки -->
        <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 2rem;">
            <button type="submit" class="btn btn-success" style="flex: 1; max-width: 200px;">Сохранить</button>
            <a href="{% url 'admin_students' %}" class="btn" style="background: #6c757d; flex: 1; max-width: 200px; text-align: center;">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
